<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Tarefa</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 20px;
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        input[type="text"] {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 5px rgba(74, 144, 226, 0.3);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin-top: 15px;
            gap: 8px;
            font-size: 14px;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background-color: #4a90e2;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #357abd;
        }
    </style>
</head>
<body>

    <div class="container">
        <form id="form">
        <h1>Cadastre uma tarefa</h1>

        <label for="titulo">Título</label>
        <input type="text" id="titulo" placeholder="Digite o título...">

        <label for="descricao">Descrição</label>
        <input type="text" id="descricao" placeholder="Digite a descrição...">

        <div class="checkbox-group">
            <input id="termos" type="checkbox"/>
            <span>Aceita os termos?</span>
        </div>

        <button type="submit" id="btn" onclick="enviarFormuario">Cadastrar</button>

        <p id="mensagem"></p>
    </form>
    </div>

    <script>

        const form = document.getElementById("form")

        form.addEventListener("submit", function(event) {
            event.preventDefault()

            const titulo = document.getElementById("titulo")
            const descricao = document.getElementById("descricao")
            const checkbox = document.getElementById("termos").checked
            const mensagem = document.getElementById("mensagem")

            const tituloValue = titulo.value
            const descricaoValue = descricao.value

            if (tituloValue === "") {
                mensagem.innerHTML = "Titulo é obrigátorio"
            }

            if (!checkbox) {
                mensagem.innerHTML = "Checbox"
            }

            console.log(tituloValue)
        })

    </script>
</body>
</html>
